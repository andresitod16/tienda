<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto - GG Shop</title>
    <link rel="stylesheet" href="contacto.css">
</head>
<body>

<header>
    <h1 class="titulo">GG Shop</h1>
<img class="log" src="logo.png" alt="Logo tienda">
    <nav class="menu">
        <ul>
            <li><a href="index.html" class="menu__link">Inicio</a></li>
            <li><a href="productos.html" class="menu__link">Productos</a></li>
            <li><a href="contacto.html" class="menu__link">Contacto</a></li>
        </ul>
    </nav>
</header>

<main>

<section id="contacto" class="contacto">

    <h2 class="log">CONTACTO</h2>

    <form class="formulario">

        <div>
            <label for="nombre">Nombre</label>
            <input type="text" id="nombre" name="nombre" required>
        </div>

        <div>
            <label for="correo">Correo</label>
            <input type="email" id="correo" name="correo" required>
        </div>

        <div>
            <label for="mensaje">Mensaje</label>
            <textarea id="mensaje" name="mensaje" rows="5" required></textarea>
        </div>

        <button type="submit">Enviar mensaje</button>

    </form>

</section>

</main>

<footer>
    <p>© 2026 GG Shop</p>
</footer>

</body>
</html>
